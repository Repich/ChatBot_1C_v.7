schema_version: 1
corpus_id: ut_11_5_27_56_mvp
title: "Эталонный корпус пользовательских вопросов ChatBot 1C v7"
scenario_count: 116
target:
  configuration: "1С:Управление торговлей (базовая), редакция 11"
  release: "11.5.27.56"
  compatibility_mode: "8.3.27"
  documentation_priority: "Встроенная справка целевой выгрузки"
  data_source: "Локальная демонстрационная база УТ через read-only MCP"
baseline_policy: >-
  Фактические эталоны для сценариев типа data формируются автоматически на
  контрольной базе и сохраняются вместе с маркером состояния данных. При
  изменении маркера фактические эталоны должны быть сформированы заново.
type_definitions:
  data: "Ответ требует фактических данных контрольной базы."
  documentation: "Ответ подтверждается доступной документацией."
  follow_up: "Ответ должен корректно использовать контекст предыдущих сообщений."
  negative: "Ожидается уточнение, отказ, отсутствие данных или контролируемая ошибка."
  interaction: "Проверяется прямое диалоговое поведение, не требующее данных или документации."

scenarios:
  - id: Q001
    category: documentation
    type: documentation
    question: "Что такое заказ клиента в УТ?"
    expected_behavior: >-
      Дать краткое определение назначения заказа клиента и сослаться на
      встроенную справку целевого релиза.
    capability_ids: [CAP-DOC-TERM, CAP-DOC-SOURCE]

  - id: Q002
    category: documentation
    type: documentation
    question: "Чем партнер отличается от контрагента?"
    expected_behavior: >-
      Объяснить бизнес-различие понятий без их смешения и привести источник из
      встроенной справки.
    capability_ids: [CAP-DOC-TERM, CAP-DOC-SOURCE]

  - id: Q003
    category: documentation
    type: documentation
    question: "Как оформить продажу товара клиенту?"
    expected_behavior: >-
      Описать подтвержденную документацией последовательность типовой продажи,
      существенные предварительные условия и источник.
    capability_ids: [CAP-DOC-SEARCH, CAP-DOC-PROCEDURE, CAP-DOC-SOURCE]

  - id: Q004
    category: documentation
    type: documentation
    question: "Как создать заказ поставщику?"
    expected_behavior: >-
      Описать типовой порядок создания заказа поставщику и сослаться на
      встроенную справку.
    capability_ids: [CAP-DOC-SEARCH, CAP-DOC-PROCEDURE, CAP-DOC-SOURCE]

  - id: Q005
    category: documentation
    type: documentation
    question: "Как переместить товар между складами?"
    expected_behavior: >-
      Описать подтвержденную последовательность оформления перемещения и
      существенные условия выполнения операции.
    capability_ids: [CAP-DOC-SEARCH, CAP-DOC-PROCEDURE, CAP-DOC-SOURCE]

  - id: Q006
    category: documentation
    type: documentation
    question: "Как оформить возврат товара от клиента?"
    expected_behavior: >-
      Описать порядок оформления возврата с указанием документационного
      источника и не добавлять неподтвержденные шаги.
    capability_ids: [CAP-DOC-SEARCH, CAP-DOC-PROCEDURE, CAP-DOC-SOURCE]

  - id: Q007
    category: documentation
    type: documentation
    question: "Почему не проводится реализация при наличии товара на складе?"
    expected_behavior: >-
      Перечислить только подтвержденные возможные причины, предложить
      проверяемые действия и не заявлять одну причину без диагностики.
    capability_ids: [CAP-DOC-SEARCH, CAP-DOC-ERROR, CAP-DOC-SOURCE]

  - id: Q008
    category: documentation
    type: documentation
    question: "Где настраиваются виды цен?"
    expected_behavior: >-
      Указать подтвержденное документацией место и назначение настройки видов
      цен для целевого релиза.
    capability_ids: [CAP-DOC-SEARCH, CAP-DOC-PROCEDURE, CAP-DOC-SOURCE]

  - id: Q009
    category: documentation
    type: documentation
    question: "Как провести инвентаризацию склада?"
    expected_behavior: >-
      Описать основные этапы инвентаризации в правильном порядке и сослаться на
      встроенную справку.
    capability_ids: [CAP-DOC-SEARCH, CAP-DOC-PROCEDURE, CAP-DOC-SOURCE]

  - id: Q010
    category: documentation
    type: documentation
    question: "Что означает статус заказа «К выполнению»?"
    expected_behavior: >-
      Объяснить бизнес-смысл статуса, его существенные последствия и источник,
      не подменяя статус фактом полного исполнения.
    capability_ids: [CAP-DOC-STATUS, CAP-DOC-SOURCE]

  - id: Q011
    category: reference_data
    type: data
    question: "Найди номенклатуру с артикулом V100123588."
    expected_behavior: >-
      Найти позиции по точному артикулу, показать идентифицирующие реквизиты или
      подтвердить отсутствие совпадений.
    capability_ids: [CAP-REF-ITEM-FIND]

  - id: Q012
    category: reference_data
    type: data
    question: "Покажи всю номенклатуру, в названии которой есть слово «куртка»."
    expected_behavior: >-
      Вернуть все подтвержденные совпадения по наименованию с понятным числом
      результатов и без условия на начало строки.
    capability_ids: [CAP-REF-ITEM-FIND]

  - id: Q013
    category: reference_data
    type: data
    question: "Какой штрихкод у телевизора «Рубин»?"
    expected_behavior: >-
      Однозначно найти товар, показать его штрихкод и идентифицирующие реквизиты;
      при нескольких товарах запросить уточнение.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-REF-ITEM-DETAILS]

  - id: Q014
    category: reference_data
    type: data
    question: "В каких единицах хранится товар «Пиво светлое»?"
    expected_behavior: >-
      Найти товар и показать доступные единицы хранения или учета, не смешивая
      их с количеством остатка.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-REF-ITEM-DETAILS]

  - id: Q015
    category: reference_data
    type: data
    question: "Покажи товары без заполненного артикула."
    expected_behavior: >-
      Вернуть ограниченный или полный по запросу список товаров с действительно
      пустым артикулом и указать количество найденных позиций.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-COMMON-COUNT]

  - id: Q016
    category: reference_data
    type: data
    question: "Сколько товаров входит в группу «Бытовая техника»?"
    expected_behavior: >-
      Найти требуемую группу, посчитать относящуюся к ней номенклатуру и явно
      указать правило учета вложенных групп, если оно влияет на результат.
    capability_ids: [CAP-REF-ITEM-GROUP, CAP-COMMON-COUNT]

  - id: Q017
    category: reference_data
    type: data
    question: "Покажи карточку клиента «Альтаир»."
    expected_behavior: >-
      Найти именно клиента, показать доступные бизнес-реквизиты и не заменить
      его договором или объектом расчетов.
    capability_ids: [CAP-REF-PARTNER-FIND, CAP-REF-PARTNER-DETAILS]

  - id: Q018
    category: reference_data
    type: data
    question: "Найди поставщиков, в названии которых есть «Электро»."
    expected_behavior: >-
      Вернуть партнеров, подтвержденных в роли поставщика, с совпадением по
      подстроке и не включать одноименных клиентов без этой роли.
    capability_ids: [CAP-REF-PARTNER-FIND]

  - id: Q019
    category: reference_data
    type: data
    question: "Покажи все розничные склады."
    expected_behavior: >-
      Вернуть склады, удовлетворяющие фактическому признаку розничного склада,
      и показать этот признак или объяснить невозможность его определить.
    capability_ids: [CAP-REF-WAREHOUSE-FIND]

  - id: Q020
    category: reference_data
    type: data
    question: "Какие кассы относятся к организации «Торговый дом»?"
    expected_behavior: >-
      Вернуть кассы и доступные типы касс выбранной организации без включения
      касс других организаций.
    capability_ids: [CAP-REF-CASH-DESK-FIND]

  - id: Q021
    category: pricing
    type: data
    question: "Покажи розничные цены на пальто."
    expected_behavior: >-
      Найти подходящую номенклатуру и вид розничной цены, затем показать
      действующие цены с датой, валютой и единицей.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-CURRENT]

  - id: Q022
    category: pricing
    type: data
    question: "Покажи последнюю закупочную цену на пиво."
    expected_behavior: >-
      Найти подходящие товары, определить последнюю фактическую закупочную цену
      и показать дату и документ-основание.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-PRICE-LAST-PURCHASE]

  - id: Q023
    category: pricing
    type: data
    question: "Покажи последнюю закупочную цену на пиво без НДС."
    expected_behavior: >-
      Показать последнюю закупочную цену без НДС, использованную ставку НДС,
      дату и документ-основание.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-PRICE-LAST-PURCHASE, CAP-PRICE-VAT]

  - id: Q024
    category: pricing
    type: data
    question: "Сравни розничную и оптовую цену телевизора «Рубин»."
    expected_behavior: >-
      Однозначно найти товар и сопоставить два вида цен на одну дату, в одной
      валюте и единице либо явно указать несопоставимость.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-COMPARE]

  - id: Q025
    category: pricing
    type: data
    question: "Покажи историю розничной цены на куртку за 2024 год."
    expected_behavior: >-
      Вернуть изменения розничной цены подходящей номенклатуры внутри заданного
      периода в хронологическом порядке.
    capability_ids: [CAP-COMMON-PERIOD, CAP-REF-ITEM-FIND, CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-HISTORY]

  - id: Q026
    category: pricing
    type: data
    question: "Какие товары сейчас не имеют розничной цены?"
    expected_behavior: >-
      Вернуть товары без действующей розничной цены на текущий момент, отдельно
      от товаров с нулевой ценой.
    capability_ids: [CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-MISSING]

  - id: Q027
    category: pricing
    type: data
    question: "Покажи товары с нулевой закупочной ценой."
    expected_behavior: >-
      Вернуть товары, для которых подтверждена именно нулевая закупочная цена,
      не смешивая их с товарами без записи цены.
    capability_ids: [CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-MISSING]

  - id: Q028
    category: pricing
    type: data
    question: "Какая цена типа «Себестоимость» установлена для курток?"
    expected_behavior: >-
      Найти подходящие товары и точный вид цены, показать действующие значения,
      включая подтвержденные нули.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-CURRENT]

  - id: Q029
    category: pricing
    type: data
    question: "Покажи действующие цены на все товары группы «Обувь»."
    expected_behavior: >-
      Если вид цены не указан и в базе их несколько, уточнить вид цены; после
      уточнения показать цены товаров выбранной группы.
    capability_ids: [CAP-CHAT-CLARIFY, CAP-REF-ITEM-GROUP, CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-CURRENT]

  - id: Q030
    category: pricing
    type: data
    question: "Какая розничная цена была у телевизора на 1 января 2024 года?"
    expected_behavior: >-
      Показать цену, действовавшую на указанную дату, с идентификацией товара,
      вида цены, валюты и единицы.
    capability_ids: [CAP-COMMON-PERIOD, CAP-REF-ITEM-FIND, CAP-REF-PRICE-TYPE-FIND, CAP-PRICE-CURRENT]

  - id: Q031
    category: sales
    type: data
    question: "Покажи реализации за 2024 год."
    expected_behavior: >-
      Вернуть реализации внутри календарного 2024 года с ключевыми реквизитами,
      общим количеством и понятным ограничением отображения.
    capability_ids: [CAP-COMMON-PERIOD, CAP-SALES-SHIPMENT-LIST]

  - id: Q032
    category: sales
    type: data
    question: "Сколько реализаций было создано по месяцам в 2024 году?"
    expected_behavior: >-
      Подсчитать документы реализации отдельно по каждому месяцу 2024 года и
      явно назвать считаемый тип документа.
    capability_ids: [CAP-COMMON-PERIOD, CAP-SALES-SHIPMENT-LIST, CAP-COMMON-COUNT, CAP-COMMON-GROUP]

  - id: Q033
    category: sales
    type: data
    question: "Покажи общую сумму реализаций за 2024 год."
    expected_behavior: >-
      Вернуть сумму документов реализации за календарный год с валютой и
      указанием примененного правила учета проведенных документов.
    capability_ids: [CAP-COMMON-PERIOD, CAP-SALES-SHIPMENT-LIST, CAP-COMMON-AGGREGATE]

  - id: Q034
    category: sales
    type: data
    question: "Какая средняя стоимость реализации за 2024 год?"
    expected_behavior: >-
      Рассчитать среднюю сумму одной включенной реализации, показать количество
      документов в знаменателе и валюту.
    capability_ids: [CAP-COMMON-PERIOD, CAP-SALES-SHIPMENT-LIST, CAP-SALES-AVERAGE]

  - id: Q035
    category: sales
    type: data
    question: "Покажи самый крупный заказ клиента."
    expected_behavior: >-
      Вернуть заказ с максимальной сопоставимой суммой, его номер, дату, клиента,
      валюту и сумму.
    capability_ids: [CAP-SALES-ORDER-LIST, CAP-COMMON-RANK]

  - id: Q036
    category: sales
    type: data
    question: "В каком состоянии заказ клиента 0000-000005?"
    expected_behavior: >-
      Однозначно найти заказ по номеру и показать его фактический статус и
      доступные показатели исполнения.
    capability_ids: [CAP-COMMON-ENTITY, CAP-SALES-ORDER-STATUS]

  - id: Q037
    category: sales
    type: follow_up
    question: "Какие товары входят в этот заказ?"
    context:
      previous_scenario: Q036
      retained_facts: [selected_sales_order]
    expected_behavior: >-
      Использовать заказ, подтвержденный в предыдущем ответе, и показать его
      строки; не выбирать другой заказ по умолчанию.
    capability_ids: [CAP-CHAT-CONTEXT, CAP-SALES-ORDER-LINES]

  - id: Q038
    category: sales
    type: data
    question: "Какой товар продавался больше всего в штуках за 2024 год?"
    expected_behavior: >-
      Суммировать проданное количество по товарам, выбрать максимум и назвать
      единицу; не ранжировать по выручке или числу строк.
    capability_ids: [CAP-COMMON-PERIOD, CAP-SALES-TURNOVER, CAP-COMMON-GROUP, CAP-COMMON-RANK]

  - id: Q039
    category: sales
    type: data
    question: "Какой товар принес наибольшую выручку за 2024 год?"
    expected_behavior: >-
      Сгруппировать выручку по товарам и вернуть товар с максимальной суммой,
      указав валюту и период.
    capability_ids: [CAP-COMMON-PERIOD, CAP-SALES-TURNOVER, CAP-COMMON-GROUP, CAP-COMMON-RANK]

  - id: Q040
    category: sales
    type: data
    question: "Покажи выручку и валовую прибыль по годам."
    expected_behavior: >-
      Показать по каждому доступному году выручку, себестоимость и валовую
      прибыль, не называть выручку прибылью.
    capability_ids: [CAP-FIN-REVENUE, CAP-FIN-COST, CAP-FIN-PROFIT, CAP-COMMON-GROUP]

  - id: Q041
    category: purchases
    type: data
    question: "Покажи последнее поступление товаров."
    expected_behavior: >-
      Выбрать фактически последнее поступление по дате и показать номер, дату,
      поставщика и сумму документа.
    capability_ids: [CAP-PURCHASE-RECEIPT-LIST, CAP-COMMON-RANK]

  - id: Q042
    category: purchases
    type: follow_up
    question: "Какая номенклатура пришла в последнем поступлении?"
    context:
      previous_scenario: Q041
      retained_facts: [selected_purchase_receipt]
    expected_behavior: >-
      Использовать поступление из предыдущего ответа и показать все его товарные
      строки с количеством и ценой.
    capability_ids: [CAP-CHAT-CONTEXT, CAP-PURCHASE-RECEIPT-LINES]

  - id: Q043
    category: purchases
    type: data
    question: "Покажи самый первый закупленный товар."
    expected_behavior: >-
      Найти наиболее раннее поступление по подтвержденной дате и показать товары
      этого документа, не ограничиваясь первой произвольной строкой.
    capability_ids: [CAP-PURCHASE-RECEIPT-LIST, CAP-COMMON-RANK, CAP-PURCHASE-RECEIPT-LINES]

  - id: Q044
    category: purchases
    type: data
    question: "Сколько поступлений было в 2024 году?"
    expected_behavior: >-
      Подсчитать документы поступления внутри календарного года и явно указать,
      какие документы вошли в расчет.
    capability_ids: [CAP-COMMON-PERIOD, CAP-PURCHASE-RECEIPT-LIST, CAP-COMMON-COUNT]

  - id: Q045
    category: purchases
    type: data
    question: "Покажи суммы закупок по поставщикам за 2024 год."
    expected_behavior: >-
      Сгруппировать сумму закупок по поставщикам за период и указать валюту и
      правило включения документов.
    capability_ids: [CAP-COMMON-PERIOD, CAP-PURCHASE-TURNOVER, CAP-COMMON-GROUP]

  - id: Q046
    category: purchases
    type: data
    question: "Какие заказы поставщикам еще не выполнены?"
    expected_behavior: >-
      Вернуть заказы с подтвержденным незавершенным исполнением и показать
      статус или показатель, на основании которого сделан вывод.
    capability_ids: [CAP-PURCHASE-ORDER-LIST, CAP-PURCHASE-ORDER-STATUS]

  - id: Q047
    category: purchases
    type: data
    question: "Какие товары заказаны, но еще не поступили?"
    expected_behavior: >-
      Показать товары и ожидаемое количество по невыполненным поставкам, не
      смешивая их с уже поступившим количеством.
    capability_ids: [CAP-PURCHASE-EXPECTED]

  - id: Q048
    category: purchases
    type: data
    question: "Когда последний раз закупали телевизор «Рубин»?"
    expected_behavior: >-
      Найти товар и вернуть дату и документ последней подтвержденной закупки с
      количеством и ценой, если они доступны.
    capability_ids: [CAP-REF-ITEM-FIND, CAP-PURCHASE-RECEIPT-LIST, CAP-PURCHASE-RECEIPT-LINES, CAP-COMMON-RANK]

  - id: Q049
    category: purchases
    type: data
    question: "Покажи возвраты поставщикам за 2024 год."
    expected_behavior: >-
      Вернуть документы и основные показатели возвратов поставщикам внутри
      календарного года.
    capability_ids: [CAP-COMMON-PERIOD, CAP-PURCHASE-RETURN]

  - id: Q050
    category: purchases
    type: data
    question: "Какая закупка была самой крупной по сумме?"
    expected_behavior: >-
      Вернуть закупочный документ с максимальной сопоставимой суммой, указав
      документ, дату, поставщика, сумму и валюту.
    capability_ids: [CAP-PURCHASE-RECEIPT-LIST, CAP-COMMON-RANK]

  - id: Q051
    category: inventory
    type: data
